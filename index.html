<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DKE Finanzierungscheck</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#D4AF37;--gold-dark:#B8941E;--gold-light:#F0E28A;
  --charcoal:#2D2D2D;--slate:#4A5568;--bg:#FFFFFF;--bg-subtle:#F5F1E9;--white:#FFFFFF;
  --success:#1D9E75;--warning:#E07B20;--error:#E24B4A;
  --border:#E2DDD4;--shadow:rgba(0,0,0,0.07);
}
html{font-size:16px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--charcoal);min-height:100vh;overflow-x:hidden}
 
/* PROGRESS */
#progress-bar{position:fixed;top:0;left:0;height:4px;background:var(--gold);transition:width .7s ease;z-index:200;width:0%}
 
/* CHAT CONTAINER */
#chat-wrap{max-width:680px;margin:0 auto;padding:20px 16px 200px;transition:padding-bottom .3s ease}
 
/* MESSAGE ROW */
.msg-row{display:flex;align-items:flex-end;gap:10px;margin-bottom:16px;opacity:0;animation:fadeIn .35s ease forwards}
.msg-row.user-row{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
 
/* AVATAR */
.av{width:40px;height:40px;border-radius:50%;background:var(--gold);color:#fff;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;letter-spacing:.3px;overflow:hidden;border:2px solid var(--gold)}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
/* JONAS_PHOTO_PLACEHOLDER – replace src below with actual base64 photo */
 
 
/* BUBBLES */
.bbl{max-width:78%;padding:14px 18px;font-size:15px;line-height:1.65}
.bbl.j{background:var(--white);border:1px solid var(--border);border-radius:18px 18px 18px 4px;box-shadow:0 2px 10px var(--shadow)}
.bbl.u{background:var(--gold);color:#fff;border-radius:18px 18px 4px 18px;box-shadow:0 2px 10px var(--shadow)}
.bbl .inf{font-size:13px;color:var(--slate);margin-top:8px;line-height:1.55;font-style:italic}
 
/* TYPING */
.t-bbl{display:flex;align-items:center;gap:5px;padding:14px 18px;background:var(--white);border:1px solid var(--border);border-radius:18px 18px 18px 4px;box-shadow:0 2px 10px var(--shadow)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:bounce 1.2s infinite ease-in-out}
.dot:nth-child(2){animation-delay:.22s}
.dot:nth-child(3){animation-delay:.44s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
 
/* INTERACTION AREA */
#ia{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:14px 16px;z-index:100}
#ia-inner{max-width:680px;margin:0 auto}
 
/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:9px;opacity:0;animation:slideUp .3s ease forwards}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.chip{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:11px 18px;font-size:14px;font-family:'Inter',sans-serif;color:var(--charcoal);cursor:pointer;transition:border-color .18s,background .18s;min-height:46px;display:flex;align-items:center;font-weight:500}
.chip:hover{border-color:var(--gold);background:#FDFAF0}
.chip.fw{width:100%;justify-content:center}
.chip:disabled{opacity:.55;cursor:default}
 
/* NAME / TEXT INPUT */
.inp-row{display:flex;gap:9px;align-items:center;opacity:0;animation:slideUp .3s ease forwards}
.t-inp{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;font-size:16px;font-family:'Inter',sans-serif;background:var(--white);color:var(--charcoal);outline:none;transition:border-color .18s;min-height:48px}
.t-inp:focus{border-color:var(--gold)}
.send-btn{width:48px;height:48px;background:var(--gold);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s}
.send-btn:hover{background:var(--gold-dark)}
.send-btn svg{width:20px;height:20px;fill:#fff}
 
/* CTA (intro) */
.intro-cta{width:100%;background:var(--gold);color:#fff;border:none;border-radius:12px;padding:16px 24px;font-size:16px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;transition:background .18s,transform .1s;min-height:56px;opacity:0;animation:slideUp .35s ease .5s forwards}
.intro-cta:hover{background:var(--gold-dark);transform:translateY(-1px)}
.intro-cta:active{transform:translateY(0)}
 
/* FREIFELD */
.ff-row{display:flex;gap:8px;align-items:center;width:100%;margin-top:10px}
.ff-inp{flex:1;border:1.5px solid var(--gold);border-radius:10px;padding:11px 14px;font-size:16px;font-family:'Inter',sans-serif;background:#fff;color:var(--charcoal);outline:none;min-height:46px}
.ff-unit{font-size:13px;color:var(--slate);white-space:nowrap}
.ff-ok{background:var(--gold);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;min-height:46px;white-space:nowrap}
.ff-ok:hover{background:var(--gold-dark)}
 
/* === GATE === */
.gate-box{background:var(--white);border-radius:20px;padding:24px;border:1px solid var(--border);box-shadow:0 4px 24px var(--shadow);margin-bottom:16px;opacity:0;animation:fadeIn .4s ease forwards}
.gauge-wrap{text-align:center;margin-bottom:22px}
.gauge-svg{width:220px;height:120px}
.gauge-lbl{font-size:13px;color:var(--slate);margin-top:6px}
.cert-prev-wrap{position:relative;margin-bottom:20px}
.cert-blur{filter:blur(6px);pointer-events:none;user-select:none;border-radius:12px;border:1px solid var(--border);padding:20px;background:#fff;overflow:hidden}
.cert-blur-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:10;pointer-events:none;width:100%}
.pulse-dot{width:10px;height:10px;background:var(--gold);border-radius:50%;display:inline-block;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.gate-explain{font-size:13px;color:var(--slate);line-height:1.55;margin-bottom:16px}
.gate-form{display:flex;flex-direction:column;gap:14px}
.f-lbl{font-size:13px;font-weight:600;color:var(--charcoal);margin-bottom:5px;display:block}
.f-wrap{position:relative}
.f-inp{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px 42px 12px 14px;font-size:16px;font-family:'Inter',sans-serif;background:var(--bg-subtle);color:var(--charcoal);outline:none;transition:border-color .18s,background .18s}
.f-inp:focus{border-color:var(--gold);background:#fff}
.f-inp.ok{border-color:var(--success)}
.f-chk{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--success);font-size:18px;opacity:0;transition:opacity .2s}
.f-chk.on{opacity:1}
.f-err{font-size:12px;color:var(--error);display:none;margin-top:3px}
.f-err.on{display:block}
.cb-row{display:flex;gap:10px;align-items:flex-start}
.cb-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--gold);cursor:pointer;flex-shrink:0;margin-top:2px}
.cb-lbl{font-size:13px;color:var(--slate);line-height:1.55;cursor:pointer}
.gate-submit{width:100%;background:var(--gold);color:#fff;border:none;border-radius:12px;padding:16px 24px;font-size:16px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;min-height:56px;transition:background .18s}
.gate-submit:hover{background:var(--gold-dark)}
 
/* === CERTIFICATE === */
.cert-card{background:#fff;border-radius:4px;border:1px solid #C8C0B0;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.18);opacity:0;transform:translateY(40px);animation:certIn .65s cubic-bezier(.22,1,.36,1) forwards;margin-bottom:24px}
@keyframes certIn{to{opacity:1;transform:translateY(0)}}
/* Official letterhead */
.cert-letterhead{background:var(--charcoal);padding:18px 28px;display:flex;justify-content:space-between;align-items:center}
.cert-lh-name{font-size:14px;font-weight:700;color:#fff;letter-spacing:.4px}
.cert-lh-sub{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.5px;text-transform:uppercase;margin-top:2px}
.cert-lh-badge{background:var(--gold);color:#fff;font-size:9px;font-weight:700;padding:5px 10px;border-radius:3px;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap}
/* Gold accent bar */
.cert-gold-bar{height:4px;background:linear-gradient(to right,var(--gold-dark),var(--gold),var(--gold-light),var(--gold))}
/* Subject line */
.cert-subject-band{background:var(--bg-subtle);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.cert-subject-ttl{font-family:'Inter',sans-serif;font-size:17px;font-weight:700;color:var(--charcoal)}
.cert-vg-pill{background:#F0EDE6;border:1px solid #E0D9CF;border-radius:3px;font-size:10px;font-weight:600;color:var(--slate);padding:4px 9px;letter-spacing:.4px;white-space:nowrap}
/* Body */
.cert-body{padding:24px 28px}
.cert-meta-row{display:flex;gap:20px;margin-bottom:18px;flex-wrap:wrap}
.cert-meta-item{font-size:12px;color:var(--slate)}.cert-meta-item strong{color:var(--charcoal);font-weight:600}
.cert-salut{font-size:14px;color:var(--charcoal);margin-bottom:10px}
.cert-txt{font-size:14px;color:var(--charcoal);line-height:1.75;margin-bottom:20px}
.cert-range{background:linear-gradient(135deg,var(--gold-dark) 0%,var(--gold) 50%,#C9A227 100%);border-radius:6px;padding:20px 24px;text-align:center;margin-bottom:22px;box-shadow:0 4px 16px rgba(212,175,55,.35)}
.cert-amt{font-family:'Inter',sans-serif;font-size:32px;font-weight:700;color:#fff;line-height:1.15;letter-spacing:-.3px}
.cert-amt-lbl{font-size:12px;color:rgba(255,255,255,.88);margin-top:6px;letter-spacing:.2px}
.cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.cg-item{background:var(--bg-subtle);border:1px solid var(--border);border-radius:4px;padding:11px 14px}
.cg-lbl{font-size:10px;color:var(--slate);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.cg-val{font-size:13px;font-weight:600;color:var(--charcoal)}
.cert-warn{background:#FEF3C7;border-left:4px solid var(--warning);border-radius:4px;padding:12px 16px;margin-bottom:18px}
.cert-warn-ttl{font-size:13px;font-weight:700;color:var(--warning);margin-bottom:6px}
.cert-warn ul{padding-left:16px}
.cert-warn li{font-size:13px;color:#92400E;line-height:1.6}
/* Signature block */
.cert-sig-block{border-top:1px solid var(--border);padding-top:20px;margin-bottom:18px;display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.cert-sig-left{}
.cert-sig-place{font-size:12px;color:var(--slate);margin-bottom:14px}
.cert-sig-script{font-family:'Dancing Script',cursive;font-size:38px;font-weight:700;color:var(--charcoal);line-height:1;margin-bottom:4px;letter-spacing:.5px}
.cert-sig-line{height:1px;background:var(--charcoal);margin-bottom:6px;width:180px}
.cert-sig-name{font-size:12px;font-weight:700;color:var(--charcoal)}
.cert-sig-title{font-size:11px;color:var(--slate)}
.cert-stamp{width:72px;height:72px;border:3px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-direction:column;flex-shrink:0;position:relative;opacity:.85}
.cert-stamp-inner{text-align:center;padding:6px}
.cert-stamp-main{font-size:8px;font-weight:800;color:var(--gold);letter-spacing:.5px;text-transform:uppercase;line-height:1.3}
.cert-stamp-year{font-size:14px;font-weight:800;color:var(--gold);margin-top:1px}
/* Footer strip */
.cert-disc{font-size:11px;font-style:italic;color:#9CA3AF;line-height:1.65;margin-bottom:16px}
.cert-valid{display:inline-flex;align-items:center;gap:6px;background:#ECFDF5;border:1px solid var(--success);border-radius:3px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--success)}
.cta-blk{background:var(--bg-subtle);border:1px solid var(--border);border-radius:6px;padding:22px;margin-top:20px;text-align:center}
.cta-blk-h{font-size:17px;font-weight:700;color:var(--charcoal);margin-bottom:8px}
.cta-blk-p{font-size:14px;color:var(--slate);line-height:1.6;margin-bottom:16px}
.cta-blk-btn{display:flex;align-items:center;justify-content:center;width:100%;background:var(--gold);color:#fff;text-decoration:none;border:none;border-radius:8px;padding:16px 24px;font-size:16px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;min-height:56px;transition:background .18s}
.cta-blk-btn:hover{background:var(--gold-dark)}
.restart-btn{display:block;width:100%;background:transparent;color:var(--slate);border:1.5px solid var(--border);border-radius:8px;padding:12px;font-size:14px;font-family:'Inter',sans-serif;cursor:pointer;margin-top:10px;transition:border-color .18s}
.restart-btn:hover{border-color:var(--slate)}
 
/* DISQUALIFIED */
.dq-blk{background:#FEF2F2;border-left:4px solid var(--error);border-radius:10px;padding:16px 20px;margin:16px 0}
.dq-ttl{font-size:14px;font-weight:700;color:var(--error);margin-bottom:6px}
.dq-txt{font-size:14px;color:#7F1D1D;line-height:1.65}
 
/* RESULT WRAP (for both outcomes) */
.result-wrap{opacity:0;animation:fadeIn .4s ease forwards;margin-bottom:8px}
 
/* ── CALC ANIMATION ── */
.calc-box{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:20px 22px;box-shadow:0 4px 20px var(--shadow)}
.calc-title{font-size:15px;font-weight:600;color:var(--charcoal);margin-bottom:14px}
.calc-steps{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.calc-step{font-size:14px;color:var(--charcoal);transition:opacity .3s;line-height:1.5}
.calc-bar-wrap{background:#E2DDD4;border-radius:20px;height:8px;overflow:hidden}
.calc-bar{height:100%;background:var(--gold);border-radius:20px;width:0%;transition:width .7s ease}
 
/* ── CERT SPINNER ── */
.cert-spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
 
/* ── HORIZONTAL BAROMETER ── */
.hbar-wrap{text-align:center;margin-bottom:22px}
.hbar-lock{font-size:26px;margin-bottom:10px}
.hbar-track{position:relative;height:30px;border-radius:15px;overflow:visible;margin:0 auto;max-width:340px;background:linear-gradient(to right,#E24B4A 0%,#E07B20 30%,#D4AF37 55%,#1D9E75 100%);box-shadow:0 3px 10px rgba(0,0,0,.15)}
.hbar-needle{position:absolute;top:-10px;width:5px;height:50px;background:var(--charcoal);border-radius:3px;transform:translateX(-50%);left:5%;animation:needleSlide 1s cubic-bezier(.22,1,.36,1) .6s forwards;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.hbar-needle::after{content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:13px;height:13px;background:var(--charcoal);border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3)}
@keyframes needleSlide{to{left:72%}}
.hbar-zone-labels{display:flex;justify-content:space-between;padding:8px 2px 0;font-size:11px;font-weight:600;color:var(--slate)}
.hbar-zone-labels span:first-child{color:var(--error)}
.hbar-zone-labels span:last-child{color:var(--success)}
.hbar-sub{font-size:13px;color:var(--slate);margin-top:10px}
 
/* ── RESPONSIVE ── */
@media(max-width:600px){
  /* Layout */
  #chat-wrap{padding:12px 10px 200px;max-width:100%}
  #ia{padding:10px 12px}
 
  /* Bubbles */
  .bbl{font-size:14px;padding:11px 14px;max-width:88%}
  .av{width:34px;height:34px;font-size:11px;flex-shrink:0}
 
  /* Chips */
  .chip{font-size:13px;padding:10px 14px;min-height:44px}
 
  /* Gate box */
  .gate-box{padding:18px 16px}
  .f-inp{font-size:16px;padding:12px 38px 12px 12px} /* prevent iOS zoom */
 
  /* Certificate */
  .cert-letterhead{padding:14px 18px}
  .cert-lh-name{font-size:12px}
  .cert-subject-band{padding:12px 18px;flex-direction:column;align-items:flex-start;gap:6px}
  .cert-body{padding:18px 18px}
  .cert-meta-row{gap:10px}
  .cert-meta-item{font-size:11px}
  .cert-amt{font-size:24px}
  .cert-range{padding:16px 18px}
  .cert-grid{grid-template-columns:1fr}
  .cert-sig-block{flex-direction:column;align-items:flex-start;gap:16px}
  .cert-sig-script{font-size:32px}
  .cert-sig-line{width:160px}
  .cert-stamp{width:60px;height:60px}
  .cert-stamp-main{font-size:7px}
  .cert-stamp-year{font-size:12px}
 
  /* Calc / spinner boxes */
  .calc-box{padding:16px 16px}
  .hbar-track{max-width:100%}
 
  /* CTA block */
  .cta-blk{padding:16px}
  .cta-blk-h{font-size:15px}
  .cta-blk-btn{font-size:15px;padding:14px 18px}
}
 
@media(max-width:380px){
  .cert-amt{font-size:20px}
  .bbl{max-width:92%}
  .chip{font-size:12px;padding:9px 12px}
}
</style>
</head>
<body>
 
<div id="progress-bar"></div>
<div id="chat-wrap">
  <div id="msgs"></div>
  <div id="anchor"></div>
</div>
<div id="ia"><div id="ia-inner"></div></div>
 
<script>
// ─────────────────────────────────────────────────────────────
// KONFIGURATION – HIER EINTRAGEN
// ─────────────────────────────────────────────────────────────
const CLOSE_WEBHOOK = 'CLOSE_WEBHOOK_URL_HIER';
const MAKE_WEBHOOK  = 'MAKE_WEBHOOK_URL_HIER';
const CALENDLY_URL  = 'CALENDLY_URL_HIER';

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const delay = ms => new Promise(r => setTimeout(r, ms));
 
function scrollDown() {
  setTimeout(() => {
    $('anchor').scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, 60);
}
 
function postHeight() {
  window.parent.postMessage({ type: 'dke-height', height: document.body.scrollHeight }, '*');
}
 
function setProgress(p) {
  $('progress-bar').style.width = p + '%';
}
 
function fmtEur(n) {
  return Math.round(n).toLocaleString('de-DE');
}
 
function capFirst(s) {
  if (!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1);
}
 
// ─────────────────────────────────────────────────────────────
// TYPING ANIMATION
// ─────────────────────────────────────────────────────────────
function scrollToTypingRow() {
  // Scroll so the typing indicator is comfortably above the IA bar — never buried at bottom edge
  requestAnimationFrame(() => {
    const row = $('typing-row');
    if (!row) return;
    const ia = $('ia');
    const iaH = ia ? ia.offsetHeight : 0;
    const rect = row.getBoundingClientRect();
    const viewH = window.innerHeight;
    const BOTTOM_GAP = 64; // generous breathing room below typing bubble
    const desiredBottomInView = viewH - iaH - BOTTOM_GAP;
    const desiredScrollTop = window.scrollY + rect.bottom - desiredBottomInView;
    window.scrollTo({ top: Math.max(0, desiredScrollTop), behavior: 'smooth' });
  });
}
 
function showTyping(ms) {
  return new Promise(resolve => {
    const row = document.createElement('div');
    row.className = 'msg-row';
    row.id = 'typing-row';
    row.innerHTML = `${avHTML()}<div class="t-bbl"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    $('msgs').appendChild(row);
    postHeight();
    scrollToTypingRow();
    setTimeout(() => { row.remove(); resolve(); }, ms);
  });
}

function addJonas(html, info) {
  const row = document.createElement('div');
  row.className = 'msg-row';
  const infoHTML = info ? `<div class="inf">${info}</div>` : '';
  row.innerHTML = `${avHTML()}<div class="bbl j">${html}${infoHTML}</div>`;
  $('msgs').appendChild(row);
  scrollDown(); postHeight();
}
 
function addUser(txt) {
  const row = document.createElement('div');
  row.className = 'msg-row user-row';
  row.innerHTML = `<div class="bbl u">${txt}</div>`;
  $('msgs').appendChild(row);
  scrollDown(); postHeight();
}
 
// ─────────────────────────────────────────────────────────────
// INTERACTION AREA
// ─────────────────────────────────────────────────────────────
function adjustBottomPad() {
  const ia = $('ia');
  if (!ia) return;
  const h = ia.offsetHeight;
  // Generous bottom padding: IA height + comfortable breathing room
  $('chat-wrap').style.paddingBottom = (h + 72) + 'px';
}
 
function scrollToLastMsg() {
  setTimeout(() => {
    const allRows = $('msgs').querySelectorAll('.msg-row');
    if (!allRows.length) { scrollDown(); return; }
    // Always target last Jonas message (not user bubble)
    const jonasMsgs = $('msgs').querySelectorAll('.msg-row:not(.user-row)');
    const target = jonasMsgs.length ? jonasMsgs[jonasMsgs.length - 1] : allRows[allRows.length - 1];
    const ia = $('ia');
    const iaH = ia ? ia.offsetHeight : 0;
    const rect = target.getBoundingClientRect();
    const viewH = window.innerHeight;
    const msgH = rect.height;
    const BOTTOM_GAP = 44; // comfortable gap between message bottom and chip bar
 
    let desiredScrollTop;
    if (msgH + iaH + BOTTOM_GAP * 2 <= viewH) {
      // Message + chip bar fit together → position so message bottom sits BOTTOM_GAP above IA
      const desiredBottomInView = viewH - iaH - BOTTOM_GAP;
      desiredScrollTop = window.scrollY + rect.bottom - desiredBottomInView;
    } else {
      // Long message → anchor its top with a small top margin
      desiredScrollTop = window.scrollY + rect.top - 16;
    }
    window.scrollTo({ top: Math.max(0, desiredScrollTop), behavior: 'smooth' });
  }, 140);
}
 
function setIA(html) {
  $('ia-inner').innerHTML = html;
  postHeight();
  // Small delay so IA bar has rendered its full height before we measure+scroll
  setTimeout(() => { adjustBottomPad(); scrollToLastMsg(); }, 100);
}
function clearIA() {
  $('ia-inner').innerHTML = '';
  // Keep generous bottom padding during typing so text never hides behind IA bar
  $('chat-wrap').style.paddingBottom = '160px';
}

function chipsHTML(opts, fw) {

    `<button class="${cls}" onclick="onChip('${escQ(o.v)}','${escQ(o.l)}')">${o.l}</button>`
  ).join('')}</div>`;
}
 
function escQ(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
 
function onChip(v, l) {
  document.querySelectorAll('.chip').forEach(c => c.disabled = true);
  addUser(l);
  clearIA();
  handleAnswer(v, l);
}

// NAME VALIDATION
// ─────────────────────────────────────────────────────────────
const BAD_NAMES = new Set([
  'test','asdf','xxxx','abc','xyz','aaa','bbb','qwerty','1234','0000',
  'hallo','hello','hi','hey','blah','foo','bar','nn','na','nein','ja',
  'name','vorname','anonym','mustermann','musterfrau','user','admin',
  'dummy','fake','nobody','someone','beispiel','person'
]);
 
// Common German/European first names to fast-accept (optional whitelist)
const VOWELS = new Set('aeiouäöüAEIOUÄÖÜ');
 
function validName(raw) {
  const t = raw.trim();
  // Basic length & character set
  if (t.length < 2 || t.length > 40) return false;
  if (!/^[a-zA-ZäöüÄÖÜß\- ]+$/.test(t)) return false;
  if (/^\s*$/.test(t)) return false;
 
  // Must contain at least one vowel (a,e,i,o,u,ä,ö,ü)
  if (![...t].some(c => VOWELS.has(c))) return false;
 
  // Vowel ratio: at least 20% of letters must be vowels
  const letters = [...t].filter(c => /[a-zA-ZäöüÄÖÜß]/.test(c));
  const vowelCount = letters.filter(c => VOWELS.has(c)).length;
  if (letters.length > 0 && vowelCount / letters.length < 0.18) return false;
 
  // No run of 4+ consecutive consonants (catches shdgsdg, brtgks, etc.)
  if (/[^aeiouäöüAEIOUÄÖÜ\- ]{4,}/.test(t)) return false;
 
  // No same char repeated 3+ times in a row
  if (/(.)\1{2,}/.test(t)) return false;
 
  // Keyboard mash patterns
  if (/^[qwrtzpsdfghjklyxcvbnm]{3,}$/i.test(t)) return false;
 
  // Blocklist
  if (BAD_NAMES.has(t.toLowerCase())) return false;
 
  return true;
}
 
function showNameInput() {
  setIA(`<div class="inp-row">
    <input class="t-inp" id="ninp" type="text" placeholder="Ihr Vorname…" maxlength="40" autocomplete="given-name"
      onkeydown="if(event.key==='Enter')doName()">
    <button class="send-btn" onclick="doName()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>`);
  setTimeout(() => { const e = $('ninp'); if(e) e.focus(); }, 350);
}
 
async function doName() {
  const el = $('ninp');
  if (!el) return;
  const raw = el.value;
  if (!validName(raw)) {
    addUser(raw || '…');
    clearIA();
    await showTyping(1800);
    addJonas('🙏 Das scheint kein gültiger Vorname zu sein – bitte geben Sie Ihren echten Vornamen ein.');
    showNameInput();
    return;
  }
  const name = capFirst(raw.trim().split(/\s+/)[0].toLowerCase());
  S.name = name;
  addUser(raw.trim());
  clearIA();
  await showTyping(2000);
  addJonas(`😊 Schön, ${name}! Dann legen wir direkt los.`);
  await delay(500);
  S.step = 'motiv';
  showStep();
}

function appendFreifeld(containerId, placeholder, unit, handler) {
  const wrap = document.createElement('div');
  wrap.className = 'ff-row';
  wrap.id = containerId;
  wrap.innerHTML = `
    <input class="ff-inp" id="ff-inp" type="number" min="0" placeholder="${placeholder}"
      onkeydown="if(event.key==='Enter')${handler}()">
    <span class="ff-unit">${unit}</span>
    <button class="ff-ok" onclick="${handler}()">OK</button>`;
  $('ia-inner').appendChild(wrap);
  setTimeout(() => { const e = $('ff-inp'); if(e) e.focus(); }, 200);
}
 
function ffVal() {
  const el = $('ff-inp');
  if (!el) return null;
  const v = parseFloat(el.value);
  if (isNaN(v) || v < 0) { el.style.borderColor = 'var(--error)'; return null; }
  return v;
}

// CALC MIN NETTO
// ─────────────────────────────────────────────────────────────
function calcMin() {
  let base = S.answers.q2 === 'verheiratet' ? 3600 : 3000;
  base += parseInt(S.answers.q3 || '0', 10) * 300;
  const miete = parseFloat(S.answers.q4 || '0');
  if (miete >= 1100) base += 400;
  else if (miete >= 900) base += 200;
  base += parseFloat(S.answers.q6 || '0');
  S.minNetto = base;
  return base;
}
 
function setFinRange(tier) {
  if (tier==='t1'){S.finFrom=150000;S.finTo=250000;}
  else if (tier==='t2'){S.finFrom=200000;S.finTo=320000;}
  else if (tier==='t3'){S.finFrom=280000;S.finTo=480000;}
  S.stufe = tier;
}

// HANDLE ANSWER

async function handleAnswer(v, l) {
  const n = S.name;
 
  switch (S.step) {
 
    case 'motiv':
      S.answers.motiv = v;
      await showFeedback('motiv_' + v);
      S.step = 'q1'; showStep(); break;
 
    case 'q1':
      S.answers.q1 = v;
      if (v === 'kein') { await doDisqual('aufenthalt'); }
      else if (v === 'befristet') { S.step = 'q1a'; showStep(); }
      else { await showFeedback('q1_' + v); S.step = 'q2'; showStep(); }
      break;
 
    case 'q1a':
      S.answers.q1a = v;
      if (v === 'bleibt') { await doDisqual('aufenthalt'); }
      else { S.warnings.push('aufenthalt_befristet'); S.step = 'q2'; showStep(); }
      break;
 
    case 'q2':
      S.answers.q2 = v;
      await showFeedback('q2_' + v);
      S.step = 'q3'; showStep(); break;
 
    case 'q3':
      S.answers.q3 = v;
      await showFeedback('q3_' + v);
      S.step = 'q4'; showStep(); break;
 
    case 'q4':
      if (v === 'ff_miete') {
        // Re-render chips without freifeld chip selected, add input below
        setIA(chipsHTML([
          {v:'0',l:'Mietfrei'},{v:'800',l:'Bis 800 €'},
          {v:'1000',l:'900 – 1.100 €'},{v:'1200',l:'Über 1.100 €'},
          {v:'ff_miete',l:'Eigene Eingabe'},
        ]) + '<div id="ff-holder"></div>');
        // Override chips click to show form
        document.querySelectorAll('.chip').forEach(c => {
          if (c.textContent === 'Eigene Eingabe') { c.disabled = true; c.style.borderColor='var(--gold)'; c.style.background='#FDFAF0'; }
        });
        appendFreifeld('ff-holder','z.B. 950','€/Monat','doMieteFF');
        return;
      }
      S.answers.q4 = v;
      await showFeedback('q4_' + v);
      S.step = 'q5'; showStep(); break;
 
    case 'q5':
      S.answers.q5 = v;
      if (v === 'such') { await doDisqual('arbeit'); }
      else if (v === 'selbst') { await showFeedback('q5_selbst'); S.step = 'q5a'; showStep(); }
      else { await showFeedback('q5_' + v); S.step = 'q6'; showStep(); }
      break;
 
    case 'q5a':
      S.answers.q5b = v;
      if (v === '1' || v === '0') S.warnings.push('abschluesse_wenig');
      await showFeedback('q5a_' + v);
      S.step = 'q5b'; showStep(); break;
 
    case 'q5b':
      S.answers.q5c = v;
      if (v === 'u60' || v === '61_99') S.warnings.push('gewinn_niedrig');
      S.step = 'q6'; showStep(); break;
 
    case 'q6':
      if (v === 'ff_kredit') {
        setIA(chipsHTML([
          {v:'0',l:'Keine laufenden Raten'},{v:'200',l:'Bis 200 €/Mon.'},
          {v:'325',l:'200 – 400 €/Mon.'},{v:'500',l:'400 – 600 €/Mon.'},
          {v:'700',l:'Über 600 €/Mon.'},{v:'ff_kredit',l:'Eigene Eingabe'},
        ]) + '<div id="ff-holder"></div>');
        document.querySelectorAll('.chip').forEach(c => {
          if (c.textContent === 'Eigene Eingabe') { c.disabled = true; c.style.borderColor='var(--gold)'; }
        });
        appendFreifeld('ff-holder','z.B. 350','€/Monat','doKreditFF');
        return;
      }
      S.answers.q6 = v;
      await reaktionKredit(v);
      S.step = 'q7'; showStep(); break;
 
    case 'q7':
      if (v === 'ff_netto') {
        calcMin();
        const M = S.minNetto;
        setIA(chipsHTML([
          {v:'under',l:`Unter ${fmtEur(M)} €`},
          {v:'t1',l:`${fmtEur(M)} bis ${fmtEur(M+500)} €`},
          {v:'t2',l:`${fmtEur(M+500)} bis ${fmtEur(M+1500)} €`},
          {v:'t3',l:`Über ${fmtEur(M+1500)} €`},
          {v:'ff_netto',l:'Eigene Eingabe'},
        ], true) + '<div id="ff-holder"></div>');
        document.querySelectorAll('.chip').forEach(c => {
          if (c.textContent === 'Eigene Eingabe') { c.disabled = true; c.style.borderColor='var(--gold)'; }
        });
        appendFreifeld('ff-holder','z.B. 3200','€ netto/Mon.','doNettoFF');
        return;
      }
      S.answers.q7 = v;
      if (v === 'under') { await doDisqual('einkommen'); return; }
      if (v === 't1') S.warnings.push('einkommen_knapp');
      setFinRange(v);
      S.step = 'q8'; showStep(); break;
 
    case 'q8':
      S.answers.q8 = v;
      if (v === 'schlecht') { await doDisqual('schufa'); return; }
      if (v === 'mittel') S.warnings.push('zahlung_mittel');
      await showFeedback('q8_' + v);
      S.step = 'q9'; showStep(); break;
 
    case 'q9':
      S.answers.q9 = v;
      if (v === 'u10') S.warnings.push('eigenkapital_wenig');
      await showFeedback('q9_' + v);
      // Kalkulations-Animation vor Gate
      await showCalcAnimation();
      S.step = 'gate'; showStep(); break;
  }
}

async function doNettoFF() {
  const v = ffVal(); if (v === null) return;

  let tier;
  if (v < M) tier = 'under';
  else if (v < M+500) tier = 't1';
  else if (v < M+1500) tier = 't2';

  S.answers.q7 = tier;
  addUser(`${fmtEur(v)} € netto/Mon.`);
  clearIA();
  if (tier === 'under') { await doDisqual('einkommen'); return; }
  if (tier === 't1') S.warnings.push('einkommen_knapp');
  setFinRange(tier);
  S.step = 'q8'; showStep();
}

// ─────────────────────────────────────────────────────────────
// GAUGE RENDER (SVG half-circle)
// ─────────────────────────────────────────────────────────────
function buildGaugeSVG(pct) {
  const total = Math.PI * 80; // arc length for r=80 half circle
  const fill = total * pct;
  const angle = (-90 + pct * 180) * Math.PI / 180;
  const ex = (100 + 80 * Math.cos(angle)).toFixed(1);
  const ey = (100 + 80 * Math.sin(angle)).toFixed(1);
  const nAngle = -90 + pct * 180;
  return `<svg class="gauge-svg" viewBox="0 0 200 120" style="overflow:visible">
    <defs>
      <style>
        #ga{stroke-dasharray:${total.toFixed(1)};stroke-dashoffset:${total.toFixed(1)};animation:ga .9s ease .4s forwards}
        @keyframes ga{to{stroke-dashoffset:${(total-fill).toFixed(1)}}}
        #gn{transform-origin:100px 100px;transform:rotate(-90deg);animation:gn .9s ease .4s forwards}
        @keyframes gn{to{transform:rotate(${nAngle}deg)}}
      </style>
    </defs>
    <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#E2DDD4" stroke-width="14" stroke-linecap="round"/>
    <path id="ga" d="M 20 100 A 80 80 0 0 1 ${ex} ${ey}" fill="none" stroke="var(--gold)" stroke-width="14" stroke-linecap="round"/>
    <line id="gn" x1="100" y1="100" x2="100" y2="22" stroke="var(--charcoal)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="100" cy="100" r="6" fill="var(--charcoal)"/>
    <text x="16" y="118" font-size="10" fill="#9CA3AF" font-family="Inter,sans-serif">0%</text>
    <text x="168" y="118" font-size="10" fill="#9CA3AF" font-family="Inter,sans-serif">100%</text>
  </svg>`;
}

function chkEmail(el) {
  const v = el.value.trim();
  const ok = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v);
  el.classList.toggle('ok', ok);
  $('ec').classList.toggle('on', ok);
  $('ee').classList.toggle('on', v.length > 2 && !ok);
  return ok;
}
 
function chkTel(el) {
  const v = el.value.trim().replace(/[\s\-\(\)\.]/g,'');
  const ok = /^(\+49|0049|0)[1-9][0-9]{8,12}$/.test(v) && v.replace(/\D/g,'').length >= 10;
  el.classList.toggle('ok', ok);
  $('tc').classList.toggle('on', ok);
  $('te').classList.toggle('on', el.value.length > 3 && !ok);
  return ok;
}
 
async function doGateSubmit() {
  const eEl = $('g-email'), tEl = $('g-tel'), cb = $('g-dsgvo');
  const eOk = chkEmail(eEl), tOk = chkTel(tEl);
  if (!eOk) { $('ee').classList.add('on'); eEl.focus(); return; }
  if (!tOk) { $('te').classList.add('on'); tEl.focus(); return; }
  if (!cb.checked) { cb.style.outline = '2px solid var(--error)'; cb.scrollIntoView({behavior:'smooth',block:'center'}); return; }
  S.email = eEl.value.trim();
  S.tel   = tEl.value.trim();
  S.qualified = true;
  // Freeze form
  const form = document.querySelector('.gate-form');
  if (form) { form.style.pointerEvents='none'; form.style.opacity='.55'; }
  setProgress(100);
  fireWebhooks();
  // Zertifikat-Ladeanimation
  await showCertLoading();
  renderCert();
}

// WEBHOOKS
// ─────────────────────────────────────────────────────────────
function fireWebhooks() {
  const now = new Date();
  const id = `lead_${now.getTime()}`;
  const spanne = S.qualified ? `${Math.round(S.finFrom/1000)}k – ${Math.round(S.finTo/1000)}k €` : null;
 
  const lead = {
    id, name:S.name, email:S.email, telefon:S.tel,
    timestamp: now.toLocaleString('de-DE'), timestamp_iso: now.toISOString(),
    qualifiziert: S.qualified, disqual_reason: S.disqual,
    finanzierung_von: S.finFrom, finanzierung_bis: S.finTo,
    einkommensstufe: S.stufe, investitionsmotiv: S.answers.motiv||'',
    warnungen: S.warnings, antworten: {...S.answers}
  };
 
  const closeP = {
    lead_name: S.name,
    contacts: [{ name:S.name,
      emails:[{email:S.email,type:'office'}],
      phones:[{phone:S.tel,type:'mobile'}] }],
    custom: {
      dke_status:          S.qualified ? 'Neuer Lead' : `Kein Potenzial – ${S.disqual}`,
      dke_pipeline:        S.qualified ? 'NEUE LEADS' : `KEIN POTENZIAL – ${(S.disqual||'').toUpperCase()}`,
      dke_motiv:           S.answers.motiv||'',
      dke_fin_spanne:      spanne||'',
      dke_fin_von:         S.finFrom,
      dke_fin_bis:         S.finTo,
      dke_einkommensstufe: S.stufe,
      dke_warnungen:       S.warnings.join(', '),
      dke_antworten_json:  JSON.stringify(S.answers)
    }
  };
 
  const send = (url, body) => {
    if (!url || url.includes('_HIER')) return;
    fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).catch(()=>{});
  };
  send(CLOSE_WEBHOOK, closeP);
  send(MAKE_WEBHOOK,  lead);
}
